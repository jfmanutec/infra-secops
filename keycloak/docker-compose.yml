# ============================================================
# KEYCLOAK + PostgreSQL
# Diretório alvo na VM03: /srv/containers/keycloak
# Rede externa: docker-network-ger
# ============================================================
# Pré-requisito:
#   docker network create docker-network-ger
#
# Iniciar:
#   docker compose up -d
#
# Parar:
#   docker compose down
# ============================================================

services:
  # --- Banco de dados PostgreSQL dedicado ao Keycloak ---
  postgres-keycloak:
    image: postgres:17.9-bookworm
    container_name: postgres-keycloak
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    entrypoint: ["/bin/bash", "/usr/local/bin/postgres-ensure-password.sh"]
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ${KC_PGDATA_PATH}:/var/lib/postgresql/data
      - ./postgres-ensure-password.sh:/usr/local/bin/postgres-ensure-password.sh:ro
    networks:
      - keycloak-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Keycloak (Identity Provider / SSO) ---
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: keycloak
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 1m
    env_file: .env
    command: start
    environment:
      KC_DB: ${KC_DB}
      KC_DB_URL: ${KC_DB_URL}
      KC_DB_USERNAME: ${KC_DB_USERNAME}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      KC_HOSTNAME: ${KC_HOSTNAME}
      KC_HOSTNAME_STRICT: ${KC_HOSTNAME_STRICT}
      KC_HTTP_ENABLED: ${KC_HTTP_ENABLED}
      KC_PROXY_HEADERS: ${KC_PROXY_HEADERS}
      KC_HEALTH_ENABLED: ${KC_HEALTH_ENABLED}
      KC_METRICS_ENABLED: ${KC_METRICS_ENABLED}
      KC_HTTP_MANAGEMENT_HEALTH_ENABLED: "true"
      KC_HTTP_PORT: ${KC_PORT_INTERNAL}
      TZ: ${TZ}
    ports:
      - "127.0.0.1:${KC_PORT_EXTERNAL}:${KC_PORT_INTERNAL}"
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    networks:
      - keycloak-internal
      - docker-network-ger
    healthcheck:
      test: ["CMD-SHELL", "{ printf 'HEAD /health/ready HTTP/1.0\\r\\n\\r\\n' >&0; grep 'HTTP/1.0 200'; } 0<>/dev/tcp/localhost/9000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  # Rede interna: apenas Keycloak <-> PostgreSQL
  keycloak-internal:
    driver: bridge

  # Rede externa compartilhada (NPM, Guacamole, Bitwarden, etc.)
  docker-network-ger:
    external: true
